name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: tavallaie
          template: classic
          
          # --- ORDER CONFIGURATION ---
          # Change the order of the words below to rearrange your profile sections
          config_order: header, introduction,fortune, metadata, achievements, habits, isocalendar,  notable, community, repositories,activity, 
          
          # Base Config
          base: header, activity, community, repositories, metadata
          base_hireable: no
          base_indepth: yes
          base_skip: yes
          config_display: large
          config_octicon: yes
          config_timezone: Asia/Tehran
          config_twemoji: yes
          
          # Plugins
          plugin_introduction: yes
          plugin_introduction_title: yes
          
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%
          
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all
          
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_repositories: yes
          plugin_notable_types: commit
          
          plugin_fortune: yes

name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: gh-metrics/metrics@master   # ✅ Use @latest instead of @master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # user: tavallaie
          template: classic
          base: header, activity, community, repositories, metadata
          base_hireable: yes
          base_indepth: yes
          base_skip: yes
          config_display: large
          config_octicon: yes
          config_order: base.header, introduction, fortune, notable, achievements, habits, base.metadata, base.repositories, base.activity+community, topics 
          config_timezone: Asia/Tehran
          config_twemoji: yes
          
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          
          plugin_languages: no
          
          plugin_fortune: no
          plugin_habits: no
          
          plugin_introduction: yes
          plugin_introduction_title: yes
          
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          
          # ===== NOTABLE PLUGIN (FIXED) =====
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_repositories: yes
          plugin_notable_self: yes
          # ✅ Include PRs and issues, not just commits
          plugin_notable_types: commit, pull_request, issue
          plugin_notable_indepth: yes
          plugin_notable_filter: stars:>=5
          plugin_notable_skipped: |
            sshayanmfard-bit/gemini-telegram-bot-developed-by-soheil
          # ===================================
          
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: starred
          plugin_topics_sort: stars
          
          repositories_forks: yes
